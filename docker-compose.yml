services:
  goldenglowitsolutions:
    build: .
    container_name: goldenglowitsolutions-app
    restart: always
    environment:
      - NODE_ENV=production
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_EMAIL=${CONTACT_EMAIL}
      - FROM_EMAIL=${FROM_EMAIL}
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.goldenglow.rule=Host(`goldenglowitsolutions.com`) || Host(`www.goldenglowitsolutions.com`)"
      - "traefik.http.routers.goldenglow.entrypoints=websecure"
      - "traefik.http.routers.goldenglow.tls.certresolver=letsencrypt"
      - "traefik.http.services.goldenglow.loadbalancer.server.port=3000"
      - "traefik.http.routers.goldenglow.middlewares=security-headers@file,compress@file"
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  traefik-public:
    external: true
